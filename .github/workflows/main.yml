name: EDGE Stock Alerts

on:
  schedule:
    - cron: '55 12 * * 1-5'
    - cron: '30 13 * * 1-5'
    - cron: '0  14 * * 1-5'
    - cron: '30 14 * * 1-5'
    - cron: '0  15 * * 1-5'
    - cron: '30 15 * * 1-5'
    - cron: '0  16 * * 1-5'
    - cron: '30 16 * * 1-5'
    - cron: '0  17 * * 1-5'
    - cron: '30 17 * * 1-5'
    - cron: '0  18 * * 1-5'
    - cron: '30 18 * * 1-5'
    - cron: '0  19 * * 1-5'
    - cron: '30 19 * * 1-5'
    - cron: '0  20 * * 1-5'
    - cron: '30 20 * * 1-5'
  workflow_dispatch:

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Run EDGE alert checker
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          TICKERS: ${{ secrets.TICKERS }}
        run: python check_alerts.py
