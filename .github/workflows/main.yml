#!/usr/bin/env python3
"""
EDGE Portfolio Alert System
===========================
Runs every 30 minutes on GitHub's servers.
Checks your stocks for analyst upgrades/downgrades,
price movements, and breaking news — then fires
push notifications to your phone via ntfy.sh.

No laptop required. Runs 24/7 for free on GitHub.
"""

import os
import json
import requests
import time
from datetime import datetime, timedelta, timezone
from pathlib import Path

# ============================================================
# CONFIG — loaded from GitHub Secrets (never hardcoded)
# ============================================================
FINNHUB_KEY  = os.environ.get('FINNHUB_API_KEY', '')
NTFY_TOPIC   = os.environ.get('NTFY_TOPIC', '')
TICKERS_RAW  = os.environ.get('TICKERS', 'TSLA,IVV,AMZN,AKAM,IAU,TMC,JNJ,LAC,ABEV,ADNT,ORCL,PLTR,HOOD,COP,GS,NVDA,AMD')
TICKERS      = [t.strip().upper() for t in TICKERS_RAW.split(',') if t.strip()]

# Skip ETFs and assets with no analyst coverage
SKIP_ANALYST = {'IVV','IAU','SPY','QQQ','GLD','SLV','BTC','ETH','VTI','VOO'}

# Alert state file — remembers what was already sent so no duplicates
STATE_FILE   = 'alert_state.json'

# ============================================================
# FINNHUB API
# ============================================================
FINNHUB_BASE = 'https://finnhub.io/api/v1'

def finnhub(endpoint, params={}):
    """Make a Finnhub API call with error handling."""
    if not FINNHUB_KEY:
        print("  WARNING: No Finnhub API key set")
        return None
    try:
        p = {**params, 'token': FINNHUB_KEY}
        r = requests.get(f'{FINNHUB_BASE}/{endpoint}', params=p, timeout=10)
        if r.status_code == 200:
            return r.json()
        elif r.status_code == 403:
            print(f"  API key invalid or endpoint requires premium: {endpoint}")
            return None
        else:
            print(f"  Finnhub error {r.status_code}: {endpoint}")
            return None
    except Exception as e:
        print(f"  Request failed: {e}")
        return None

# ============================================================
# STATE MANAGEMENT
# Remembers what alerts have already been sent
# Prevents sending the same alert 16 times a day
# ============================================================
def load_state():
    try:
        if Path(STATE_FILE).exists():
            with open(STATE_FILE) as f:
                state = json.load(f)
            # Clean up entries older than 7 days
            cutoff = (datetime.now(timezone.utc) - timedelta(days=7)).isoformat()
            state = {k: v for k, v in state.items() if v.get('time','') > cutoff}
            return state
    except:
        pass
    return {}

def save_state(state):
    try:
        with open(STATE_FILE, 'w') as f:
            json.dump(state, f, indent=2)
    except Exception as e:
        print(f"  Could not save state: {e}")

def already_alerted(state, key):
    return key in state

def mark_alerted(state, key):
    state[key] = {'time': datetime.now(timezone.utc).isoformat()}

# ============================================================
# NTFY.SH — SEND PHONE NOTIFICATION
# ============================================================
def send_notification(title, body, priority='high', tags='chart_with_upwards_trend'):
    """Send a push notification to your phone via ntfy.sh."""
    if not NTFY_TOPIC:
        print(f"  [NO NTFY TOPIC] Would send: {title}")
        return False
    try:
        r = requests.post(
            f'https://ntfy.sh/{NTFY_TOPIC}',
            data=body.encode('utf-8'),
            headers={
                'Title': title,
                'Priority': priority,
                'Tags': tags,
                'Content-Type': 'text/plain',
            },
            timeout=10
        )
        if r.status_code == 200:
            print(f"  ✅ SENT: {title}")
            return True
        else:
            print(f"  ❌ ntfy failed ({r.status_code}): {title}")
            return False
    except Exception as e:
        print(f"  ❌ ntfy error: {e}")
        return False

# ============================================================
# CHECK 1: ANALYST UPGRADES & DOWNGRADES
# Uses Finnhub's individual firm action endpoint
# Real firm names, real dates — today's moves only
# ============================================================
def check_upgrades_downgrades(ticker, state):
    """Check for recent analyst upgrades/downgrades from named firms."""
    if ticker in SKIP_ANALYST:
        return

    print(f"  Checking analyst actions: {ticker}")
    data = finnhub(f'stock/upgrade-downgrade', {'symbol': ticker})
    if not data or not isinstance(data, list):
        return

    # Look at last 7 days of analyst actions
    cutoff = datetime.now(timezone.utc) - timedelta(days=7)
    today   = datetime.now(timezone.utc).date()

    for action in data:
        grade_date_str = action.get('gradeDate', '')
        firm           = action.get('company', 'Unknown Firm')
        from_grade     = action.get('fromGrade', '')
        to_grade       = action.get('toGrade', '')
        action_type    = action.get('action', '').lower()

        if not grade_date_str:
            continue

        try:
            grade_date = datetime.strptime(grade_date_str, '%Y-%m-%d').date()
        except:
            continue

        # Only last 7 days
        if grade_date < (today - timedelta(days=7)):
            continue

        # Classify the action
        is_upgrade   = action_type in ('upgrade',) or any(
            w in (to_grade or '').lower() for w in
            ['strong buy','buy','overweight','outperform','positive'])
        is_downgrade = action_type in ('downgrade',) or any(
            w in (to_grade or '').lower() for w in
            ['sell','underweight','underperform','negative','strong sell'])
        is_initiation = action_type in ('init','initiated','initiate')
        is_reiteration = action_type in ('reit','reiterate','maintained','maintain')

        if not any([is_upgrade, is_downgrade, is_initiation, is_reiteration]):
            continue

        # Build unique key to avoid duplicate alerts
        alert_key = f"analyst_{ticker}_{firm}_{grade_date_str}_{to_grade}"
        if already_alerted(state, alert_key):
            continue

        # Determine alert type
        if is_upgrade:
            emoji    = '⬆️'
            priority = 'high'
            tags     = 'green_circle,chart_with_upwards_trend'
            label    = 'UPGRADE'
        elif is_downgrade:
            emoji    = '⬇️'
            priority = 'urgent'
            tags     = 'red_circle,chart_with_downwards_trend'
            label    = 'DOWNGRADE'
        elif is_initiation:
            emoji    = '🆕'
            priority = 'high'
            tags     = 'new,chart_with_upwards_trend'
            label    = 'INITIATED'
        else:
            emoji    = '🔄'
            priority = 'default'
            tags     = 'arrows_counterclockwise'
            label    = 'REITERATED'

        # Only send alerts for upgrades, downgrades, and initiations
        # Skip reiterations to avoid noise
        if is_reiteration and to_grade.lower() in ('hold','neutral','equal-weight','market perform'):
            continue

        # Build the message
        from_str = f" from {from_grade}" if from_grade else ''
        title = f"{emoji} {label}: {ticker} — {firm}"
        body  = (
            f"{firm} {label.lower()} {ticker}{from_str} → {to_grade}\n"
            f"Date: {grade_date_str}\n\n"
            f"Check EDGE app for full analysis and current price."
        )

        if grade_date == today:
            title = f"🚨 TODAY: {title}"  # Extra emphasis for same-day alerts
            body  = "⚡ FRESH TODAY ⚡\n\n" + body

        send_notification(title, body, priority=priority, tags=tags)
        mark_alerted(state, alert_key)
        time.sleep(0.5)

# ============================================================
# CHECK 2: PRICE MOVEMENT ALERTS
# Flags big moves — up or down — since last check
# ============================================================
def check_price_alerts(ticker, state):
    """Alert on significant intraday price movements."""
    data = finnhub('quote', {'symbol': ticker})
    if not data or not data.get('c'):
        return

    current  = data['c']
    prev     = data['pc']  # previous close
    change   = data.get('dp', 0)  # % change

    if not prev or prev == 0:
        return

    abs_change = abs(change)

    # Alert thresholds
    thresholds = [
        (10, 'urgent', '🚀🚀', 'MASSIVE MOVE'),
        (7,  'urgent', '🚀',  'BIG MOVE'),
        (5,  'high',   '📈',  'STRONG MOVE'),
    ]

    for threshold, priority, emoji, label in thresholds:
        if abs_change >= threshold:
            direction = 'UP' if change > 0 else 'DOWN'
            alert_key = f"price_{ticker}_{direction}_{abs(int(change))}pct_{datetime.now().date()}"
            if already_alerted(state, alert_key):
                break

            title = f"{emoji} {label}: {ticker} {direction} {abs(change):.1f}%"
            body  = (
                f"{ticker} is {direction} {abs(change):.1f}% today\n"
                f"Current: ${current:.2f}  |  Prev Close: ${prev:.2f}\n\n"
                f"Check EDGE app for signals and analysis."
            )

            send_notification(title, body, priority=priority,
                            tags='chart_with_upwards_trend' if change > 0 else 'chart_with_downwards_trend')
            mark_alerted(state, alert_key)
            break

# ============================================================
# CHECK 3: BREAKING NEWS FOR YOUR STOCKS
# Scans today's news for analyst action language
# ============================================================
def check_news_alerts(ticker, state):
    """Scan today's news for analyst mentions and major events."""
    if ticker in SKIP_ANALYST:
        return

    today     = datetime.now(timezone.utc).date()
    yesterday = today - timedelta(days=1)

    data = finnhub('company-news', {
        'symbol': ticker,
        'from':   yesterday.isoformat(),
        'to':     today.isoformat()
    })

    if not data or not isinstance(data, list):
        return

    # Keywords that indicate a significant analyst action in a headline
    upgrade_words   = ['upgrade', 'raises target', 'raises price target', 'increases target',
                       'initiates', 'outperform', 'overweight', 'strong buy', 'buy rating']
    downgrade_words = ['downgrade', 'cuts target', 'lowers target', 'reduces target',
                       'underperform', 'underweight', 'sell rating', 'cautious on']

    for article in data[:10]:  # Check first 10 articles
        headline = (article.get('headline') or '').strip()
        summary  = (article.get('summary')  or '').strip()
        article_id = str(article.get('id', hash(headline)))

        if not headline:
            continue

        text_lower = (headline + ' ' + summary).lower()

        is_upgrade   = any(w in text_lower for w in upgrade_words)
        is_downgrade = any(w in text_lower for w in downgrade_words)

        if not is_upgrade and not is_downgrade:
            continue

        alert_key = f"news_{ticker}_{article_id}"
        if already_alerted(state, alert_key):
            continue

        if is_upgrade:
            emoji    = '📰⬆️'
            priority = 'high'
            tags     = 'newspaper,green_circle'
            label    = 'BULLISH NEWS'
        else:
            emoji    = '📰⬇️'
            priority = 'high'
            tags     = 'newspaper,red_circle'
            label    = 'BEARISH NEWS'

        source = article.get('source', 'News')
        title  = f"{emoji} {label}: {ticker} — {source}"
        body   = (
            f"{headline}\n\n"
            f"{summary[:200] + '...' if len(summary) > 200 else summary}\n\n"
            f"Source: {source}\n"
            f"Check EDGE app for full analysis."
        )

        send_notification(title, body, priority=priority, tags=tags)
        mark_alerted(state, alert_key)
        time.sleep(0.3)

# ============================================================
# CHECK 4: MARKET OPEN / CLOSE SUMMARY
# Daily brief sent to your phone at 9:30am and 4:00pm ET
# ============================================================
def send_market_summary(state):
    """Send a morning briefing with your portfolio overview."""
    now_et = datetime.now(timezone.utc) - timedelta(hours=4)  # rough ET
    hour   = now_et.hour
    minute = now_et.minute

    # Morning brief at ~9:30am ET
    is_morning = (hour == 9 and 29 <= minute <= 35)
    # Closing brief at ~4:00pm ET
    is_closing = (hour == 16 and 0 <= minute <= 10)

    if not is_morning and not is_closing:
        return

    session = 'morning' if is_morning else 'closing'
    key     = f"summary_{session}_{now_et.date()}"
    if already_alerted(state, key):
        return

    # Fetch quick prices for all tickers
    prices = {}
    movers_up   = []
    movers_down = []

    for ticker in TICKERS[:8]:  # Limit to first 8 to save API calls
        data = finnhub('quote', {'symbol': ticker})
        if data and data.get('c') and data.get('dp') is not None:
            change = data['dp']
            prices[ticker] = (data['c'], change)
            if change >= 3:
                movers_up.append(f"{ticker} +{change:.1f}%")
            elif change <= -3:
                movers_down.append(f"{ticker} {change:.1f}%")
        time.sleep(0.2)

    if is_morning:
        emoji = '🌅'
        title = f"{emoji} EDGE Morning Brief — Market Open"
        lines = ["Good morning! Market is now open.\n"]
    else:
        emoji = '🔔'
        title = f"{emoji} EDGE Closing Brief — Market Closed"
        lines = ["Market has closed for the day.\n"]

    if movers_up:
        lines.append(f"📈 Top gainers: {', '.join(movers_up[:3])}")
    if movers_down:
        lines.append(f"📉 Top losers:  {', '.join(movers_down[:3])}")

    lines.append(f"\nCheck EDGE app for full analysis & signals.")

    send_notification(title, '\n'.join(lines), priority='default',
                     tags='bell,chart_with_upwards_trend')
    mark_alerted(state, key)

# ============================================================
# CHECK 5: INSIDER TRADING ALERTS
# When executives buy their own stock — always a bullish signal
# ============================================================
def check_insider_trades(ticker, state):
    """Alert when company insiders make significant purchases."""
    if ticker in SKIP_ANALYST:
        return

    data = finnhub('stock/insider-transactions', {'symbol': ticker})
    if not data or not isinstance(data.get('data'), list):
        return

    today   = datetime.now(timezone.utc).date()
    cutoff  = today - timedelta(days=7)

    for tx in data['data'][:20]:
        tx_date   = tx.get('transactionDate', '')
        shares    = tx.get('share', 0) or 0
        price     = tx.get('price', 0) or 0
        tx_code   = tx.get('transactionCode', '')
        name      = tx.get('name', 'Insider')
        position  = tx.get('filingDate', '')

        # Only open market purchases (code P = purchase)
        if tx_code != 'P' or shares <= 0:
            continue

        try:
            td = datetime.strptime(tx_date, '%Y-%m-%d').date()
        except:
            continue

        if td < cutoff:
            continue

        value = shares * price
        # Only alert on meaningful purchases ($10k+)
        if value < 10000:
            continue

        alert_key = f"insider_{ticker}_{name}_{tx_date}_{shares}"
        if already_alerted(state, alert_key):
            continue

        title = f"💼 INSIDER BUY: {ticker} — ${value:,.0f}"
        body  = (
            f"{name} bought {shares:,} shares of {ticker}\n"
            f"Price: ${price:.2f}  |  Total: ${value:,.0f}\n"
            f"Date: {tx_date}\n\n"
            f"Insiders only buy for one reason — they think it's going up.\n"
            f"Check EDGE app for full context."
        )

        send_notification(title, body, priority='high',
                         tags='briefcase,green_circle')
        mark_alerted(state, alert_key)
        time.sleep(0.3)

# ============================================================
# MAIN — runs everything
# ============================================================
def main():
    now = datetime.now(timezone.utc)
    print(f"\n{'='*50}")
    print(f"EDGE Alert Check — {now.strftime('%Y-%m-%d %H:%M UTC')}")
    print(f"Tickers: {', '.join(TICKERS)}")
    print(f"Finnhub key: {'✅ set' if FINNHUB_KEY else '❌ MISSING'}")
    print(f"ntfy topic:  {'✅ ' + NTFY_TOPIC if NTFY_TOPIC else '❌ MISSING'}")
    print(f"{'='*50}\n")

    if not FINNHUB_KEY:
        print("ERROR: FINNHUB_API_KEY secret not set in GitHub repository settings.")
        return
    if not NTFY_TOPIC:
        print("ERROR: NTFY_TOPIC secret not set in GitHub repository settings.")
        return

    # Load alert state to avoid duplicate notifications
    state = load_state()

    # 1. Morning / closing brief
    print("📋 Checking market summary...")
    send_market_summary(state)

    # 2. Per-ticker checks
    for ticker in TICKERS:
        print(f"\n--- {ticker} ---")

        # Analyst upgrades/downgrades (most important)
        check_upgrades_downgrades(ticker, state)
        time.sleep(0.3)

        # Big price moves
        check_price_alerts(ticker, state)
        time.sleep(0.3)

        # Analyst mentions in news
        check_news_alerts(ticker, state)
        time.sleep(0.3)

        # Insider purchases
        check_insider_trades(ticker, state)
        time.sleep(0.5)

    # Save updated state
    save_state(state)
    print(f"\n✅ Check complete. State saved with {len(state)} tracked alerts.")
    print(f"{'='*50}\n")

if __name__ == '__main__':
    main()
